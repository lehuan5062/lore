syntax = "proto3";

package urc.rpc;

import "model.proto";

service RepositoryService {
    rpc RepositoryCreate(urc.model.RepositoryCreateRequest) returns (urc.model.RepositoryCreateResponse);
    rpc RepositoryDelete(urc.model.RepositoryDeleteRequest) returns (urc.model.RepositoryDeleteResponse);
    rpc RepositoryQuery(urc.model.RepositoryQueryRequest) returns (urc.model.RepositoryQueryResponse);
    rpc RepositoryList(urc.model.RepositoryListRequest) returns (urc.model.RepositoryListResponse);
    rpc RepositoryMetadataGet(urc.model.RepositoryMetadataGetRequest) returns (urc.model.RepositoryMetadataGetResponse);
    rpc RepositoryMetadataSet(urc.model.RepositoryMetadataSetRequest) returns (urc.model.RepositoryMetadataSetResponse);
}
