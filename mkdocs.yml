site_name: Lore Developer Documentation

theme:
  name: material
  logo: assets/icons/lore-logo-horizontal.svg
  favicon: assets/icons/favicon.svg
  # Force dark-only — no auto switching, no light toggle.
  palette:
    - scheme: slate
      primary: custom
      accent: custom
  # Disable Material's Google Fonts loader; fonts are self-hosted in docs/assets/fonts/.
  font: false
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - toc.integrate

extra_css:
  - assets/css/eds.css

plugins:
  - search
  - section-index
  - mkdocs-breadcrumbs-plugin:
      use_page_titles: true
      exclude_paths:
        - "**"

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
