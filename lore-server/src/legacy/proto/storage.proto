syntax = "proto3";

package urc.rpc;

import "model.proto";

service StorageService {
    rpc Get(stream urc.model.Address) returns (stream urc.model.GetResponse);
    rpc Ping(urc.model.PingRequest) returns (urc.model.PingResponse);
    rpc Put(stream urc.model.PutRequest) returns (stream urc.model.PutResponse);
    rpc Query(urc.model.QueryRequest) returns (urc.model.QueryResponse);
    rpc Verify(urc.model.VerifyRequest) returns (urc.model.VerifyResponse);
    rpc Copy(stream urc.model.CopyRequest) returns (stream urc.model.CopyResponse);
    rpc MutableLoad(urc.model.MutableLoadRequest) returns (urc.model.MutableLoadResponse);
    rpc MutableStore(urc.model.MutableStoreRequest) returns (urc.model.MutableStoreResponse);
    rpc MutableCompareAndSwap(urc.model.MutableCompareAndSwapRequest) returns (urc.model.MutableCompareAndSwapResponse);
}
