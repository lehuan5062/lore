syntax = "proto3";

package urc.rpc;

import "model.proto";

service RevisionService {
    rpc BranchCreate(urc.model.BranchCreateRequest) returns (urc.model.BranchCreateResponse) {
        option deprecated = true;
    }
    rpc BranchDelete(urc.model.BranchDeleteRequest) returns (urc.model.BranchDeleteResponse) {
        option deprecated = true;
    }
    rpc BranchQuery(urc.model.BranchQueryRequest) returns (urc.model.BranchQueryResponse) {
        option deprecated = true;
    }
    rpc BranchGet(urc.model.BranchGetRequest) returns (urc.model.BranchGetResponse) {
        option deprecated = true;
    }
    rpc BranchList(urc.model.BranchListRequest) returns (urc.model.BranchListResponse) {
        option deprecated = true;
    }
    rpc BranchPush(urc.model.BranchPushRequest) returns (urc.model.BranchPushResponse) {
        option deprecated = true;
    }
    rpc BranchProtect(urc.model.BranchProtectRequest) returns (urc.model.BranchProtectResponse);
    rpc BranchUnprotect(urc.model.BranchUnprotectRequest) returns (urc.model.BranchUnprotectResponse);
    rpc BranchDiff(urc.model.BranchDiffRequest) returns (urc.model.BranchDiffResponse) {
        option deprecated = true;
    }
    rpc BranchRevisionList(urc.model.BranchRevisionListRequest) returns (urc.model.BranchRevisionListResponse);
    rpc BranchMetadataGet(urc.model.BranchMetadataGetRequest) returns (urc.model.BranchMetadataGetResponse) {
        option deprecated = true;
    }
    rpc BranchMetadataSet(urc.model.BranchMetadataSetRequest) returns (urc.model.BranchMetadataSetResponse) {
        option deprecated = true;
    }
    rpc RevisionDescribe(urc.model.RevisionDescribeRequest) returns (urc.model.RevisionDescribeResponse) {
        option deprecated = true;
    }
    rpc RevisionDiff(urc.model.RevisionDiffRequest) returns (urc.model.RevisionDiffResponse) {
        option deprecated = true;
    }
    rpc RevisionStateHistory(urc.model.RevisionStateHistoryRequest) returns (urc.model.RevisionStateHistoryResponse);
    rpc RevisionTree(urc.model.RevisionTreeRequest) returns (urc.model.RevisionTreeResponse) {
        option deprecated = true;
    }
    rpc RevisionList(urc.model.RevisionListRequest) returns (urc.model.RevisionListResponse) {
        option deprecated = true;
    }
}
